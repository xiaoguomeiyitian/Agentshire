<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentshire Editor — 角色工坊</title>
  <link rel="icon" href="/src/assets/logo.png" />
  <link rel="stylesheet" href="/src/styles/editor.css" />
</head>
<body>
  <div id="editor-root">

    <!-- Top Nav Bar -->
    <div id="editor-toolbar">
      <a class="toolbar-brand" href="/">
        <img src="/src/assets/logo-title.png" alt="Agentshire" class="toolbar-logo" />
      </a>
      <nav class="editor-mode-switch" aria-label="工坊切换">
        <div class="editor-mode-indicator"></div>
        <a class="editor-mode-btn" href="editor.html" data-i18n="editor.scene_workshop">
          场景工坊
        </a>
        <button type="button" class="editor-mode-btn active" data-mode="citizen" data-i18n="editor.citizen_workshop">
          角色工坊
        </button>
      </nav>

      <span class="toolbar-spacer"></span>

      <div class="toolbar-section">
        <button class="toolbar-btn" id="btn-undo" title="撤销 (Ctrl+Z)" data-i18n-title="editor.undo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-redo" title="重做 (Ctrl+Shift+Z)" data-i18n-title="editor.redo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.13-9.36L23 10"/></svg>
        </button>
      </div>

      <div class="toolbar-section">
        <button class="toolbar-btn" id="btn-save" title="保存 (Ctrl+S)" data-i18n-title="editor.save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span data-i18n="editor.save">保存</span>
        </button>
        <button class="toolbar-btn-primary" id="btn-publish" title="发布到小镇" data-i18n-title="editor.publish_to_town">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          <span data-i18n="editor.publish">发布</span>
        </button>
        <div class="more-dropdown">
          <button class="toolbar-btn" id="btn-more" title="更多" data-i18n-title="editor.more">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
          </button>
          <div class="more-menu" id="more-menu">
            <button id="btn-import">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              <span data-i18n="editor.import_char">导入角色配置</span>
            </button>
            <button id="btn-export">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <span data-i18n="editor.export_char">导出角色配置</span>
            </button>
            <div class="menu-divider"></div>
            <button id="btn-clear" class="menu-danger">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
              <span data-i18n="editor.clear_char">清空角色配置</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Citizen Workshop -->
    <div id="citizen-workshop" class="citizen-workshop visible">
      <!-- Left: Character roster -->
      <div id="citizen-roster" class="cw-roster">
        <div class="cw-roster-header">
          <span class="cw-roster-title" data-i18n="editor.char_list">角色列表</span>
        </div>
        <div class="cw-roster-list" id="cw-roster-list"></div>
        <div class="cw-roster-footer">
          <button class="cw-add-btn" id="cw-add-citizen" data-i18n="editor.add_citizen">+ 添加居民</button>
        </div>
      </div>

      <!-- Center: 3D stage above, model picker below -->
      <div class="cw-center" id="cw-center">
        <div class="cw-stage-wrap" id="cw-stage-wrap">
          <div class="cw-stage-canvas" id="cw-stage-canvas"></div>
        </div>
        <div class="cw-model-bar" id="cw-model-bar">
          <span class="cw-model-bar-label" data-i18n="editor.selected_model">已选角色模型：</span>
          <span class="cw-model-current" id="cw-model-current">--</span>
          <button class="cw-model-change-btn" id="cw-model-change" data-i18n="editor.change_model">更换模型</button>
        </div>
        <div class="cw-picker-topbar" id="cw-picker-topbar">
          <span class="cw-picker-title" data-i18n="editor.char_asset_lib">角色资产库</span>
          <div class="cw-picker-tabs" id="cw-picker-tabs">
            <button class="cw-picker-tab active" data-filter="all" data-i18n="editor.tab_all">通用</button>
            <button class="cw-picker-tab" data-filter="custom" data-i18n="editor.tab_custom">我的</button>
          </div>
          <button class="cw-picker-close" id="cw-picker-close" title="关闭">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="cw-picker-scroll" id="cw-picker-scroll">
          <div class="cw-picker-grid" id="cw-picker-grid"></div>
        </div>
        <div class="cw-picker-footer" id="cw-picker-footer">
          <span class="cw-picker-footer-current" id="cw-footer-current"><span data-i18n="editor.selected_char">已选角色：</span>--</span>
          <span class="cw-picker-footer-arrow">→</span>
          <span class="cw-picker-footer-candidate" id="cw-footer-candidate"><span data-i18n="editor.change_to">更换为：</span><span data-i18n="editor.not_selected">未选择</span></span>
          <div class="cw-picker-footer-actions">
            <button class="cw-picker-cancel-btn" id="cw-picker-cancel" data-i18n="editor.cancel">取消</button>
            <button class="cw-picker-confirm-btn" id="cw-picker-confirm" disabled data-i18n="editor.confirm_change">确认更换</button>
          </div>
        </div>
      </div>

      <!-- Right: Character inspector -->
      <div id="citizen-inspector" class="cw-inspector">
        <div class="cw-inspector-header">
          <span class="cw-inspector-title" data-i18n="editor.char_settings">角色设置</span>
        </div>
        <div class="cw-inspector-content" id="cw-inspector-content"></div>
      </div>
    </div>

    <!-- Add citizen dialog -->
    <div id="add-citizen-overlay" class="confirm-overlay-base">
      <div class="confirm-dialog">
        <div class="confirm-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        </div>
        <div class="confirm-title" data-i18n="editor.add_citizen_title">添加居民</div>
        <div class="confirm-message" data-i18n="editor.add_citizen_msg">请输入新居民的名称</div>
        <input type="text" id="add-citizen-name" class="cw-dialog-input" placeholder="居民名称" data-i18n-placeholder="editor.citizen_name_placeholder" maxlength="20" autofocus />
        <div class="confirm-actions">
          <button class="confirm-btn confirm-cancel" id="add-citizen-cancel" data-i18n="editor.cancel">取消</button>
          <button class="confirm-btn confirm-ok" id="add-citizen-ok" data-i18n="editor.add">添加</button>
        </div>
      </div>
    </div>

    <!-- Confirm dialog -->
    <div id="confirm-overlay">
      <div class="confirm-dialog">
        <div class="confirm-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div class="confirm-title" id="confirm-title" data-i18n="editor.confirm_title">确认</div>
        <div class="confirm-message" id="confirm-message"></div>
        <div class="confirm-actions">
          <button class="confirm-btn confirm-cancel" id="confirm-cancel" data-i18n="editor.cancel">取消</button>
          <button class="confirm-btn confirm-ok" id="confirm-ok" data-i18n="editor.ok">确定</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="/src/editor/citizen-main.ts"></script>
</body>
</html>
