<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentshire Editor — 模型管理</title>
  <link rel="icon" href="/src/assets/logo.png" />
  <link rel="stylesheet" href="/src/styles/editor.css" />
  <link rel="stylesheet" href="/src/styles/model-manager.css" />
</head>
<body>
  <div id="editor-root">

    <!-- Top Nav Bar -->
    <div id="editor-toolbar">
      <a class="toolbar-brand" href="/">
        <img src="/src/assets/logo-title.png" alt="Agentshire" class="toolbar-logo" />
      </a>
      <nav class="editor-mode-switch" aria-label="工坊切换">
        <div class="editor-mode-indicator"></div>
        <a class="editor-mode-btn" href="editor.html" data-i18n="editor.scene_workshop">
          场景工坊
        </a>
        <a class="editor-mode-btn" href="citizen-editor.html" data-i18n="editor.citizen_workshop">
          角色工坊
        </a>
        <button type="button" class="editor-mode-btn active" data-mode="model" data-i18n="editor.model_workshop">
          模型管理
        </button>
      </nav>

      <span class="toolbar-spacer"></span>

      <div class="toolbar-section">
        <button class="toolbar-btn" id="btn-undo" title="撤销 (Ctrl+Z)" data-i18n-title="editor.undo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-redo" title="重做 (Ctrl+Shift+Z)" data-i18n-title="editor.redo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.13-9.36L23 10"/></svg>
        </button>
      </div>

      <div class="toolbar-section">
        <button class="toolbar-btn" id="btn-save" title="保存 (Ctrl+S)" data-i18n-title="editor.save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span data-i18n="editor.save">保存</span>
        </button>
        <div class="more-dropdown">
          <button class="toolbar-btn" id="btn-more" title="更多" data-i18n-title="editor.more">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
          </button>
          <div class="more-menu" id="more-menu">
            <button id="btn-import">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              <span data-i18n="editor.import_models">导入模型配置</span>
            </button>
            <button id="btn-export">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <span data-i18n="editor.export_models">导出模型配置</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Model Manager -->
    <div id="model-manager" class="model-manager visible">
      <!-- Left: Provider list -->
      <div id="mm-provider-list" class="mm-provider-list">
        <div class="mm-list-header">
          <span class="mm-list-title" data-i18n="editor.provider_list">模型供应商</span>
          <button class="mm-add-btn" id="mm-add-provider" data-i18n="editor.add_provider">+ 添加</button>
        </div>
        <div class="mm-list-items" id="mm-providers"></div>
      </div>

      <!-- Right: Provider detail + model list -->
      <div id="mm-detail" class="mm-detail">
        <div id="mm-empty" class="mm-empty">
          <p data-i18n="editor.model_empty_hint">从左侧选择一个供应商，或点击「+ 添加」新建供应商。</p>
        </div>
        <div id="mm-provider-detail" class="mm-provider-detail" hidden>
          <div class="mm-detail-header">
            <div class="mm-detail-title">
              <span id="mm-provider-name" class="mm-provider-name"></span>
              <span id="mm-provider-id" class="mm-provider-id"></span>
              <span id="mm-provider-api" class="mm-badge"></span>
            </div>
            <div class="mm-detail-actions">
              <button class="mm-btn" id="mm-edit-provider" data-i18n="editor.edit">编辑</button>
              <button class="mm-btn mm-btn-danger" id="mm-delete-provider" data-i18n="editor.delete">删除</button>
              <button class="mm-btn mm-btn-primary" id="mm-add-model" data-i18n="editor.add_model">+ 添加模型</button>
            </div>
          </div>
          <div class="mm-provider-meta">
            <div class="mm-meta-row"><span class="mm-meta-label" data-i18n="editor.base_url">Base URL</span><span id="mm-provider-url" class="mm-meta-value"></span></div>
            <div class="mm-meta-row"><span class="mm-meta-label" data-i18n="editor.api_key">API Key</span><span id="mm-provider-key" class="mm-meta-value"></span></div>
          </div>
          <div class="mm-model-list-header">
            <span data-i18n="editor.model_list">模型列表</span>
            <span id="mm-model-count" class="mm-count"></span>
          </div>
          <div class="mm-model-cards" id="mm-models"></div>
        </div>
      </div>
    </div>

    <!-- Provider form modal -->
    <div id="mm-provider-modal" class="mm-modal-overlay" hidden>
      <div class="mm-modal">
        <div class="mm-modal-header">
          <span id="mm-provider-modal-title" data-i18n="editor.add_provider">添加供应商</span>
          <button class="mm-modal-close" id="mm-provider-modal-close">×</button>
        </div>
        <div class="mm-modal-body">
          <label class="mm-field">
            <span data-i18n="editor.provider_id">供应商 ID</span>
            <input type="text" id="mm-provider-id-input" placeholder="openai / ollama / my-provider" />
            <small data-i18n="editor.provider_id_hint">仅限小写字母、数字、连字符、下划线</small>
          </label>
          <label class="mm-field">
            <span data-i18n="editor.api_type">API 类型</span>
            <select id="mm-provider-api-input">
              <option value="openai-completions">openai-completions</option>
              <option value="openai-responses">openai-responses</option>
              <option value="openai-chatgpt-responses">openai-chatgpt-responses</option>
              <option value="azure-openai-responses">azure-openai-responses</option>
              <option value="anthropic-messages">anthropic-messages</option>
              <option value="google-generative-ai">google-generative-ai</option>
              <option value="bedrock-converse-stream">bedrock-converse-stream</option>
              <option value="ollama">ollama</option>
              <option value="cerebras-native">cerebras-native</option>
              <option value="deepseek-native">deepseek-native</option>
              <option value="chutes-native">chutes-native</option>
            </select>
          </label>
          <label class="mm-field">
            <span data-i18n="editor.base_url">Base URL</span>
            <input type="text" id="mm-provider-url-input" placeholder="https://api.openai.com/v1" />
          </label>
          <label class="mm-field">
            <span data-i18n="editor.api_key">API Key</span>
            <input type="text" id="mm-provider-key-input" placeholder="${API_KEY} 或 ${input:secret-name}" />
            <small data-i18n="editor.api_key_hint">支持 ${ENV} 环境变量引用，如 ${API_KEY}</small>
          </label>
        </div>
        <div class="mm-modal-footer">
          <button class="mm-btn" id="mm-provider-cancel" data-i18n="editor.cancel">取消</button>
          <button class="mm-btn mm-btn-primary" id="mm-provider-save" data-i18n="editor.save">保存</button>
        </div>
      </div>
    </div>

    <!-- Model form modal -->
    <div id="mm-model-modal" class="mm-modal-overlay" hidden>
      <div class="mm-modal">
        <div class="mm-modal-header">
          <span id="mm-model-modal-title" data-i18n="editor.add_model">添加模型</span>
          <button class="mm-modal-close" id="mm-model-modal-close">×</button>
        </div>
        <div class="mm-modal-body">
          <label class="mm-field">
            <span data-i18n="editor.model_id">模型 ID</span>
            <input type="text" id="mm-model-id-input" placeholder="gpt-4o" />
          </label>
          <label class="mm-field">
            <span data-i18n="editor.display_name">显示名称</span>
            <input type="text" id="mm-model-name-input" placeholder="GPT-4o" />
          </label>
          <div class="mm-field-row">
            <label class="mm-field">
              <span data-i18n="editor.max_input_tokens">最大输入 Token</span>
              <input type="number" id="mm-model-maxin-input" placeholder="256000" value="256000" />
            </label>
            <label class="mm-field">
              <span data-i18n="editor.max_output_tokens">最大输出 Token</span>
              <input type="number" id="mm-model-maxout-input" placeholder="16384" value="16384" />
            </label>
          </div>
        </div>
        <div class="mm-modal-footer">
          <button class="mm-btn" id="mm-model-cancel" data-i18n="editor.cancel">取消</button>
          <button class="mm-btn mm-btn-primary" id="mm-model-save" data-i18n="editor.save">保存</button>
        </div>
      </div>
    </div>

    <!-- Import dialog -->
    <div id="mm-import-dialog" class="mm-modal-overlay" hidden>
      <div class="mm-modal">
        <div class="mm-modal-header">
          <span data-i18n="editor.import_models">导入模型配置</span>
          <button class="mm-modal-close" id="mm-import-close">×</button>
        </div>
        <div class="mm-modal-body">
          <label class="mm-field">
            <span data-i18n="editor.import_mode">导入模式</span>
            <select id="mm-import-mode">
              <option value="append" data-i18n="editor.import_append">合并（跳过重复 ID）</option>
              <option value="new" data-i18n="editor.import_new">仅新增（跳过已存在 ID）</option>
              <option value="replace" data-i18n="editor.import_replace">替换全部</option>
            </select>
          </label>
          <label class="mm-field">
            <span data-i18n="editor.import_json">配置 JSON</span>
            <textarea id="mm-import-json" rows="10" placeholder='{"providers":{...}}'></textarea>
          </label>
        </div>
        <div class="mm-modal-footer">
          <button class="mm-btn" id="mm-import-cancel" data-i18n="editor.cancel">取消</button>
          <button class="mm-btn mm-btn-primary" id="mm-import-apply" data-i18n="editor.import_apply">导入</button>
        </div>
      </div>
    </div>

    <!-- Confirm overlay (shared) -->
    <div id="confirm-overlay" class="confirm-overlay">
      <div class="confirm-dialog">
        <h3 id="confirm-title"></h3>
        <p id="confirm-message"></p>
        <div class="confirm-actions">
          <button class="mm-btn" id="confirm-cancel" data-i18n="editor.cancel">取消</button>
          <button class="mm-btn mm-btn-danger" id="confirm-ok" data-i18n="editor.confirm">确定</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="/src/editor/model-main.ts"></script>
</body>
</html>
