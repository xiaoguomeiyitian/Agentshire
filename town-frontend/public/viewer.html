<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文档查看器</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12; color: #e8e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 32px; max-width: 800px; margin: 0 auto; line-height: 1.7;
  }
  .loading { color: #6a6a8a; font-size: 14px; }
  .error { color: #f87171; font-size: 14px; }
  #content h1 { font-size: 28px; margin: 24px 0 16px; color: #fff; }
  #content h2 { font-size: 22px; margin: 20px 0 12px; color: #e8e8f0; border-bottom: 1px solid #1a1a2e; padding-bottom: 8px; }
  #content h3 { font-size: 18px; margin: 16px 0 8px; color: #e8e8f0; }
  #content p { margin: 8px 0; color: #c8c8d8; }
  #content ul, #content ol { margin: 8px 0 8px 24px; color: #c8c8d8; }
  #content li { margin: 4px 0; }
  #content code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  #content pre { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
  #content pre code { background: none; padding: 0; }
  #content blockquote { border-left: 3px solid #45E796; padding-left: 16px; margin: 12px 0; color: #a8a8c0; }
  #content a { color: #00d4ff; text-decoration: none; }
  #content a:hover { text-decoration: underline; }
  #content hr { border: none; border-top: 1px solid #1a1a2e; margin: 20px 0; }
  #content img { max-width: 100%; border-radius: 8px; margin: 12px 0; }
  #content table { border-collapse: collapse; width: 100%; margin: 12px 0; }
  #content th, #content td { border: 1px solid #1a1a2e; padding: 8px 12px; text-align: left; }
  #content th { background: rgba(255,255,255,0.05); }
  .toolbar { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
  .toolbar .filename { font-size: 13px; color: #6a6a8a; flex: 1; }
  .toolbar button { background: rgba(255,255,255,0.1); color: #e8e8f0; border: none; padding: 6px 16px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  .toolbar button:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<div class="toolbar">
  <span class="filename" id="filename">加载中...</span>
  <button onclick="downloadRaw()">下载原文件</button>
</div>
<div id="content"><span class="loading">加载文档中...</span></div>

<script>
const params = new URLSearchParams(location.search);
const filePath = params.get('file');

let rawUrl = '';

/**
 * 把绝对路径转为相对路径（去掉前导斜杠），使 fetch 相对当前页面 URL 解析。
 */
function apiUrl(path) {
  if (typeof path !== 'string' || !path.startsWith('/')) return path
  return path.slice(1)
}

async function loadDocument() {
  const contentEl = document.getElementById('content');
  const filenameEl = document.getElementById('filename');

  if (!filePath) {
    contentEl.innerHTML = '<span class="error">缺少 file 参数。用法: /viewer.html?file=/steward-workspace/tasks/xxx/article.md</span>';
    return;
  }

  rawUrl = new URL(apiUrl(filePath), location.href).href;
  const fileName = filePath.split('/').pop() || filePath;
  filenameEl.textContent = fileName;
  document.title = fileName + ' — 文档查看器';

  try {
    const resp = await fetch(rawUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();

    if (fileName.endsWith('.md')) {
      contentEl.innerHTML = marked.parse(text);
    } else {
      contentEl.innerHTML = '<pre><code>' + text.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>';
    }
  } catch (err) {
    contentEl.innerHTML = `<span class="error">加载失败: ${err.message}<br><br>URL: ${rawUrl}</span>`;
  }
}

function downloadRaw() {
  if (rawUrl) window.open(rawUrl, '_blank');
}

loadDocument();
</script>

</body>
</html>
