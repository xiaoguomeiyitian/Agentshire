<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Agentshire</title>
  <link rel="icon" href="/src/assets/logo.png" />
  <style>
    body { margin: 0; background: #1e1e1e; overflow: hidden; }
    #game-root { width: 100%; height: 100vh; }
    #back-btn, #progress-bar, #progress-label, #npc-card,
    #town-init-loading, #tab-settings,
    #town-setup-overlay, #game-publish-overlay, #media-publish-overlay,
    #media-lightbox, #scene-fade { display: none; }
    #loading-screen {
      position: absolute; inset: 0; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #1e1e1e; font-family: system-ui, -apple-system, sans-serif;
    }
    .loading-label { color: rgba(212,165,116,0.5); font-size: 20px; font-weight: 900; letter-spacing: 0.3em; }
    .loading-dots .dot { opacity: 0; }
    #town-bottom-panel { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1100; }
  </style>
</head>
<body>
  <div id="game-root">
    <div id="main-content">
      <div id="game-container" tabindex="0"></div>
      <div id="scene-fade"></div>
      <button id="back-btn">← Back</button>
      <div id="progress-bar"><div class="fill" style="width:0%"></div></div>
      <div id="progress-label"></div>
      <div id="npc-card"></div>
      <div id="loading-screen">
        <div class="capybara-wrap">
          <div class="capybara-shadow"></div>
          <div class="capybara-bounce">
            <svg width="200" height="200" viewBox="0 0 300 300" style="overflow:visible">
              <path class="steam steam-1" d="M 140 5 Q 130 -10, 145 -20 T 140 -40" fill="none" stroke="#D4A574" stroke-width="6" stroke-linecap="round" pathLength="1"/>
              <path class="steam steam-2" d="M 165 0 Q 180 -15, 160 -25 T 165 -45" fill="none" stroke="#D4A574" stroke-width="6" stroke-linecap="round" pathLength="1"/>
              <path d="M 95 90 C 80 65, 50 75, 65 105" fill="#282420" stroke="#D4A574" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M 205 90 C 220 65, 250 75, 235 105" fill="#282420" stroke="#D4A574" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M 100 250 C 30 250, 20 130, 80 90 C 105 75, 130 70, 150 70 C 170 70, 195 75, 220 90 C 280 130, 270 250, 200 250 Z" fill="#282420" stroke="#D4A574" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
              <g stroke="#D4A574" stroke-width="8" fill="#282420" stroke-linejoin="round" stroke-linecap="round">
                <path d="M 115 70 L 115 30 C 115 25, 120 20, 125 20 L 175 20 C 180 20, 185 25, 185 30 L 185 70 Z"/>
                <path d="M 185 35 C 210 35, 210 55, 185 55" fill="none"/>
                <ellipse cx="150" cy="20" rx="30" ry="8" fill="#282420"/>
                <ellipse cx="150" cy="20" rx="20" ry="4" fill="#D4A574" stroke="none"/>
              </g>
              <!-- blush removed -->
              <ellipse cx="150" cy="175" rx="60" ry="45" fill="#302a24" stroke="#D4A574" stroke-width="8"/>
              <path d="M 150 165 L 150 190 M 150 190 C 130 190, 120 180, 120 170 M 150 190 C 170 190, 180 180, 180 170" fill="none" stroke="#D4A574" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
              <g stroke="#D4A574" stroke-width="8" stroke-linecap="round" fill="none">
                <path d="M 70 145 Q 80 145 90 145">
                  <animate attributeName="d" values="M 70 145 Q 80 145 90 145;M 78 145 Q 80 145 82 145;M 70 145 Q 80 145 90 145;M 70 145 Q 80 145 90 145;M 78 145 Q 80 145 82 145;M 70 145 Q 80 145 90 145;M 70 145 Q 80 145 90 145" keyTimes="0;0.02;0.04;0.08;0.1;0.12;1" dur="6s" repeatCount="indefinite"/>
                </path>
                <path d="M 230 145 Q 220 145 210 145">
                  <animate attributeName="d" values="M 230 145 Q 220 145 210 145;M 222 145 Q 220 145 218 145;M 230 145 Q 220 145 210 145;M 230 145 Q 220 145 210 145;M 222 145 Q 220 145 218 145;M 230 145 Q 220 145 210 145;M 230 145 Q 220 145 210 145" keyTimes="0;0.02;0.04;0.08;0.1;0.12;1" dur="6s" repeatCount="indefinite"/>
                </path>
              </g>
            </svg>
          </div>
        </div>
        <div class="loading-label">LOADING<span class="loading-dots"><span class="dot d1">.</span><span class="dot d2">.</span><span class="dot d3">.</span></span></div>
      </div>
      <div id="town-init-loading">
        <div class="loading-spinner"></div>
        <div style="color:#fff;font-size:15px;margin-bottom:8px;" data-i18n="loading.init_town">正在初始化小镇...</div>
        <div style="color:rgba(255,255,255,0.5);font-size:12px;" data-i18n="loading.creating_souls">正在为居民创建人设文件</div>
      </div>
      <button id="tab-settings" style="display:none;"></button>
    </div>
  </div>
  <div id="town-setup-overlay">
    <div class="ts-card" id="ts-card">
      <!-- Content injected by TownSetupUI -->
    </div>
  </div>
  <div id="game-publish-overlay">
    <div class="gp-card" style="display:flex;flex-direction:column;align-items:center;">
      <div class="gp-title" data-i18n="task_done">任务完成</div>
      <div class="gp-cover-wrap" id="gp-cover-container"></div>
      <button class="gp-play-btn" id="gp-play-btn" data-i18n="try_now">立即体验</button>
      <button class="gp-later" id="gp-later-btn" data-i18n="later">稍后再说</button>
    </div>
  </div>

  <div id="media-publish-overlay">
    <div class="gp-card" id="media-card" style="display:flex;flex-direction:column;align-items:center;max-width:380px;">
      <div class="gp-title" data-i18n="task_done">任务完成</div>

      <!-- Single view: preview only -->
      <div class="media-single-view" id="media-single-view">
        <div class="media-preview-container" id="media-single-preview"></div>
      </div>

      <!-- List view -->
      <div class="media-list-view" id="media-list-view">
        <div id="media-list-container"></div>
      </div>

      <!-- Buttons as direct gp-card children, same as game card -->
      <button class="gp-play-btn" id="media-single-download" style="display:none;" data-i18n="download">下 载</button>
      <button class="gp-later" id="media-single-ignore" style="display:none;" data-i18n="later">稍后再说</button>
      <button class="gp-later" id="media-list-ignore" style="display:none;" data-i18n="later">稍后再说</button>
    </div>
  </div>

  <div id="media-lightbox">
    <button id="media-lightbox-close">✕</button>
    <img id="media-lightbox-img" src="" />
  </div>

  <!-- ── Bottom Input Panel (OpenClaw input bar) ── -->
  <div id="town-bottom-panel">
    <div id="town-agent-status">
      <div class="tas-meta">
        <div class="tas-line">
          <span class="tas-name" data-i18n="steward">管家</span>
          <span class="tas-model"></span>
        </div>
      </div>
      <!-- Issue 4: quick action bar moved into the agent-status row (same line
           as steward name + model id) to reduce input bar height and give the
           upper popup window more vertical space. -->
      <div id="town-quick-actions"></div>
      <div style="position:relative;flex-shrink:0;display:flex;gap:6px;align-items:center;">
        <button id="town-end-topic-btn" type="button" style="display:none;">结束话题</button>
        <button id="town-more-btn" type="button" title="More" data-i18n="more_btn">更多 <span style="font-size:10px;">▾</span></button>
        <div id="town-action-dropdown" style="display:none;"></div>
      </div>
    </div>
    <div id="town-stt-interim"></div>
    <div id="town-image-preview"></div>
    <div id="town-input-row">
      <button id="town-attach-btn" aria-label="Attach image" data-i18n-title="attach_title" title="上传图片">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <input type="file" id="town-file-input" accept="image/png,image/jpeg,image/webp" multiple hidden>
      <button id="town-mention-btn" type="button" aria-label="Mention" title="@提及" style="display:none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/>
        </svg>
      </button>
      <textarea id="town-input-text" data-i18n-placeholder="input.idle" placeholder="输入消息...." rows="1"></textarea>
      <button id="town-voice-btn" aria-label="Voice input" data-i18n-title="voice_title" title="语音输入">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button id="town-send-btn" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3.714 3.048a.498.498 0 0 0-.683.627l2.843 7.627a2 2 0 0 1 0 1.396l-2.842 7.627a.498.498 0 0 0 .682.627l18-8.5a.5.5 0 0 0 0-.904z"/><path d="M6 12h16"/>
        </svg>
      </button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
